# Zul node configuration template — TESTNET.
# Copy to config/testnet/node.toml and adjust; the live node.toml must never
# be committed (it references real key material). Settles to Solana devnet.

[node]
network = "testnet"
data_dir = "./data/testnet"
genesis_path = "./config/testnet/genesis.toml"
# Sequencer keypair (Solana CLI JSON format). Generated locally, never committed.
sequencer_key_path = "./keys/testnet/sequencer.json"
slot_duration_ms = 500

[rpc]
http_addr = "127.0.0.1:8899"
ws_addr = "127.0.0.1:8900"
# Built-in faucet (requestAirdrop) — fine on a testnet.
faucet_enabled = true
faucet_max_lamports = 10000000000
faucet_key_path = "./keys/testnet/faucet.json"

[l1]
# Settlement/bridge against Solana devnet.
enabled = false
rpc_url = "https://api.devnet.solana.com"
settlement_program_id = ""
da_log_program_id = ""
bridge_authority_key_path = ""
batch_interval_slots = 120
# Empty on testnet: native ZUL is faucet-minted / SOL-backed (a SOL deposit
# credits native ZUL). Set this only on a chain that uses a bridged gas mint.
gas_mint = ""
