# Zul node configuration template.
# Copy to node.toml and adjust; node.toml must never be committed if it
# references real key material.

[node]
data_dir = "./data"
genesis_path = "./config/genesis.example.toml"
# Sequencer keypair (Solana CLI JSON format). Generated locally, never committed.
sequencer_key_path = "./keys/sequencer.json"
slot_duration_ms = 500

[rpc]
http_addr = "127.0.0.1:8899"
ws_addr = "127.0.0.1:8900"
# Built-in faucet (requestAirdrop). Disable on public deployments unless rate-limited.
# Airdrops are real System transfers signed by the faucet key below.
faucet_enabled = true
faucet_max_lamports = 10000000000
faucet_key_path = "./keys/faucet.json"

[l1]
# Settlement/bridge against Solana L1. Disabled until programs are deployed
# and real RPC endpoints/keys are configured.
enabled = false
rpc_url = "https://api.devnet.solana.com"
settlement_program_id = ""
da_log_program_id = ""
bridge_authority_key_path = ""
batch_interval_slots = 120
