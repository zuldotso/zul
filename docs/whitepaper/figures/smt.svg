<svg viewBox="0 0 600 320" width="600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .node{fill:#ffffff;stroke:#94a3b8;stroke-width:1.2}
      .pnode{fill:#efeafc;stroke:#5a2ee0;stroke-width:1.6}
      .edge{stroke:#cbd5e1;stroke-width:1.3}
      .pedge{stroke:#5a2ee0;stroke-width:2}
      .lab{font-size:11.5px;fill:#475569}
      .mono{font-family:Consolas,monospace}
    </style>
  </defs>

  <!-- edges (draw first) -->
  <line class="pedge" x1="300" y1="48" x2="190" y2="100"/>
  <line class="edge"  x1="300" y1="48" x2="430" y2="100"/>
  <line class="edge"  x1="190" y1="112" x2="110" y2="164"/>
  <line class="pedge" x1="190" y1="112" x2="262" y2="164"/>
  <line class="pedge" x1="262" y1="176" x2="214" y2="228"/>
  <line class="edge"  x1="262" y1="176" x2="320" y2="228"/>
  <line class="pedge" x1="214" y1="240" x2="214" y2="276"/>

  <!-- root -->
  <circle class="pnode" cx="300" cy="40" r="13"/>
  <text x="300" y="28" text-anchor="middle" class="lab" fill="#3a1f93" font-weight="700">root = state_root</text>

  <!-- depth 1 -->
  <circle class="pnode" cx="190" cy="106" r="12"/>
  <g>
    <polygon class="node" points="430,98 412,128 448,128" fill="#f6f7f9" stroke="#cbd5e1" stroke-dasharray="3 2"/>
    <text x="430" y="146" text-anchor="middle" class="lab">e₁ (empty)</text>
  </g>

  <!-- depth 2 -->
  <g>
    <polygon class="node" points="110,158 92,188 128,188" fill="#f6f7f9" stroke="#cbd5e1" stroke-dasharray="3 2"/>
    <text x="110" y="206" text-anchor="middle" class="lab">e₂ (empty)</text>
  </g>
  <circle class="pnode" cx="262" cy="170" r="12"/>

  <!-- depth 3 -->
  <circle class="pnode" cx="214" cy="234" r="12"/>
  <circle class="node"  cx="320" cy="234" r="12"/>
  <text x="320" y="262" text-anchor="middle" class="lab">sibling (in proof)</text>

  <!-- leaf -->
  <rect x="150" y="278" width="128" height="34" rx="5" class="pnode"/>
  <text x="214" y="293" text-anchor="middle" class="lab mono" fill="#3a1f93" font-size="10.5">leaf(pk, acct_hash)</text>
  <text x="214" y="306" text-anchor="middle" class="lab" font-size="10">key = blake3(pk)</text>

  <!-- legend -->
  <g transform="translate(396,212)">
    <rect x="0" y="0" width="196" height="96" rx="6" fill="#faf8f3" stroke="#e2e0da"/>
    <circle cx="16" cy="18" r="7" class="pnode"/>
    <text x="30" y="22" class="lab" font-size="11">authentication path</text>
    <circle cx="16" cy="40" r="7" class="node"/>
    <text x="30" y="44" class="lab" font-size="11">stored sibling</text>
    <polygon points="9,58 23,58 16,70" fill="#f6f7f9" stroke="#cbd5e1" stroke-dasharray="3 2"/>
    <text x="30" y="70" class="lab" font-size="11">empty subtree (bitmap)</text>
    <text x="12" y="88" class="lab mono" font-size="10">node = blake3(L‖R)</text>
  </g>
</svg>
