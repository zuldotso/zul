<svg viewBox="0 0 600 250" width="600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="la" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#5a2ee0"/></marker>
    <style>
      .pill{fill:#efeafc;stroke:#5a2ee0;stroke-width:1.5}
      .pl{font-size:13px;fill:#3a1f93;font-weight:700}
      .lane{fill:#f5f3fc;stroke:#b9a9ef;stroke-width:1.2}
      .ll{font-size:11.5px;fill:#3a1f93;font-weight:600}
      .pub{font-size:10px;fill:#15161b}
      .prv{font-size:10px;fill:#5a2ee0;font-style:italic}
      .eff{font-size:10px;fill:#565a63}
      .e{stroke:#5a2ee0;stroke-width:1.6;fill:none}
      .g{fill:#ffffff;stroke:#94a3b8;stroke-width:1.1}
    </style>
  </defs>

  <!-- state lane -->
  <rect class="lane" x="14" y="12" width="572" height="34" rx="6"/>
  <text x="300" y="33" text-anchor="middle" class="ll">Shielded-pool state — commitment tree (depth 26, 64-root ring) · nullifier set</text>

  <!-- entry / exit -->
  <rect class="g" x="14" y="80" width="34" height="40" rx="5"/><text x="31" y="96" text-anchor="middle" class="pub">funds</text><text x="31" y="110" text-anchor="middle" class="pub">in</text>
  <line class="e" x1="48" y1="100" x2="74" y2="100" marker-end="url(#la)"/>

  <!-- pills -->
  <rect class="pill" x="76" y="78" width="120" height="44" rx="9"/><text x="136" y="105" text-anchor="middle" class="pl">SHIELD</text>
  <line class="e" x1="196" y1="100" x2="238" y2="100" marker-end="url(#la)"/>
  <rect class="pill" x="240" y="78" width="120" height="44" rx="9"/><text x="300" y="105" text-anchor="middle" class="pl">TRANSFER</text>
  <line class="e" x1="360" y1="100" x2="402" y2="100" marker-end="url(#la)"/>
  <rect class="pill" x="404" y="78" width="120" height="44" rx="9"/><text x="464" y="105" text-anchor="middle" class="pl">UNSHIELD</text>
  <line class="e" x1="524" y1="100" x2="550" y2="100" marker-end="url(#la)"/>
  <rect class="g" x="552" y="80" width="34" height="40" rx="5"/><text x="569" y="96" text-anchor="middle" class="pub">funds</text><text x="569" y="110" text-anchor="middle" class="pub">out</text>

  <!-- captions -->
  <text x="136" y="150" text-anchor="middle" class="pub">public: asset, amount, secret</text>
  <text x="136" y="164" text-anchor="middle" class="eff">no proof · insert 1 commitment</text>

  <text x="300" y="150" text-anchor="middle" class="pub">public: nullifiers, commitments, fee</text>
  <text x="300" y="164" text-anchor="middle" class="prv">hidden: amounts, asset, sender↔receiver</text>
  <text x="300" y="178" text-anchor="middle" class="eff">2 nullifiers in · 2 commitments out</text>

  <text x="464" y="150" text-anchor="middle" class="pub">public: recipient, amount, asset</text>
  <text x="464" y="164" text-anchor="middle" class="eff">1 nullifier in · 1 change commitment</text>

  <text x="14" y="216" class="eff" font-size="10.5">Each spend reveals only a nullifier (unlinkable to its commitment without the spending key) and a Groth16 proof of well-formedness.</text>
</svg>
