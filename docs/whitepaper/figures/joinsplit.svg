<svg viewBox="0 0 600 318" width="600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ja" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#5a2ee0"/></marker>
    <style>
      .note{fill:#ffffff;stroke:#94a3b8;stroke-width:1.1}
      .out{fill:#efeafc;stroke:#5a2ee0;stroke-width:1.3}
      .circ{fill:#f5f3fc;stroke:#5a2ee0;stroke-width:1.8}
      .t{font-size:11.5px;fill:#15161b;font-weight:600}
      .s{font-size:10px;fill:#565a63}
      .c{font-size:10.5px;fill:#20222a}
      .e{stroke:#5a2ee0;stroke-width:1.3;fill:none}
      .mono{font-family:Consolas,monospace}
    </style>
  </defs>

  <!-- public signals -->
  <rect class="out" x="120" y="10" width="360" height="30" rx="6"/>
  <text x="300" y="30" text-anchor="middle" class="c mono">public: [ root, nf₀, nf₁, cm₀, cm₁, fee ]</text>
  <line class="e" x1="300" y1="40" x2="300" y2="64" marker-end="url(#ja)"/>

  <!-- inputs -->
  <rect class="note" x="10" y="92" width="120" height="44" rx="6"/>
  <text x="70" y="112" text-anchor="middle" class="t">input note 0</text>
  <text x="70" y="127" text-anchor="middle" class="s">+ Merkle path</text>
  <rect class="note" x="10" y="150" width="120" height="44" rx="6"/>
  <text x="70" y="170" text-anchor="middle" class="t">input note 1</text>
  <text x="70" y="185" text-anchor="middle" class="s">dummy if v = 0</text>
  <line class="e" x1="130" y1="114" x2="172" y2="130" marker-end="url(#ja)"/>
  <line class="e" x1="130" y1="172" x2="172" y2="156" marker-end="url(#ja)"/>

  <!-- circuit box -->
  <rect class="circ" x="174" y="66" width="252" height="196" rx="8"/>
  <text x="300" y="86" text-anchor="middle" class="t" fill="#3a1f93">Transfer circuit — Groth16/BN254</text>
  <line x1="186" y1="94" x2="414" y2="94" stroke="#d9d2f5"/>
  <text x="188" y="112" class="c">• membership of real inputs ∈ root</text>
  <text x="188" y="130" class="c">• nf = H₃(cm, i, s) bound to public</text>
  <text x="188" y="148" class="c">• cm = H₃(asset, v, secret) bound</text>
  <text x="188" y="166" class="c">• Σ inputs = Σ outputs + fee</text>
  <text x="188" y="184" class="c">• one shared asset_id (kept private)</text>
  <text x="188" y="202" class="c">• fee ≠ 0 ⇒ asset_id = 0</text>
  <text x="188" y="220" class="c">• amounts &lt; 2⁶⁴ (range check)</text>
  <text x="188" y="238" class="c">• nf₀ ≠ nf₁ (no in-proof reuse)</text>

  <!-- outputs -->
  <line class="e" x1="426" y1="130" x2="468" y2="118" marker-end="url(#ja)"/>
  <line class="e" x1="426" y1="172" x2="468" y2="184" marker-end="url(#ja)"/>
  <rect class="out" x="470" y="98" width="120" height="40" rx="6"/>
  <text x="530" y="114" text-anchor="middle" class="t">output cm₀</text>
  <text x="530" y="129" text-anchor="middle" class="s">to recipient</text>
  <rect class="out" x="470" y="164" width="120" height="40" rx="6"/>
  <text x="530" y="180" text-anchor="middle" class="t">output cm₁</text>
  <text x="530" y="195" text-anchor="middle" class="s">change</text>

  <!-- conservation -->
  <text x="300" y="288" text-anchor="middle" class="c mono" fill="#3a1f93">v_in0 + v_in1  =  v_out0 + v_out1 + fee   (mod nothing — 64-bit, cannot wrap)</text>
</svg>
